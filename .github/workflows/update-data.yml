name: Aggiorna dati Fantassist

on:
  schedule:
    - cron: "0 5 * * 1"
    - cron: "0 12 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui scraper
        run: python scraper.py

      - name: Commit dei JSON aggiornati
        run: |
          git config user.name "fantassist-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "Dati aggiornati $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
