<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fantassist</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-512.png">
<meta name="theme-color" content="#0C1A12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;900&family=Saira:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0C1A12; --bg2:#10231A; --card:#16301F; --cardhi:#1C3B27;
  --line:#2A4A35; --chalk:#EAF4EC; --dim:#9DB8A5;
  --fluo:#D8F651; --amber:#FFC24B; --red:#FF6B6B; --cyan:#6BD5E1;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; background:var(--bg); color:var(--chalk);
  font-family:'Saira',system-ui,sans-serif; padding-bottom:76px}
h1{font-family:'Saira Condensed',sans-serif; letter-spacing:.03em}
.wrap{max-width:520px; margin:0 auto; padding:0 12px}
header{position:sticky; top:0; z-index:40; background:var(--bg);
  border-bottom:1px solid var(--line); padding:14px 0 10px}
header .row{display:flex; justify-content:space-between; align-items:center}
h1{margin:0; font-size:26px; font-weight:900}
h1 .fluo{color:var(--fluo)}
.ver{font-size:11px; font-weight:900; color:var(--bg); background:var(--fluo);
  border-radius:6px; padding:1px 5px; margin-left:7px; vertical-align:super; letter-spacing:0}
.sub{font-size:11px; color:var(--dim); margin-top:2px}
.btn{background:var(--card); color:var(--fluo); border:1px solid var(--line);
  border-radius:10px; padding:8px 12px; font:700 12px 'Saira'; cursor:pointer;
  transition:background .15s, border-color .15s}
.btn:active{background:var(--cardhi)}
.btn.primary{background:var(--fluo); color:var(--bg); border-color:var(--fluo); font-size:15px; padding:12px 22px}
.btn:disabled{opacity:.5}
nav{position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:var(--bg2); border-top:1px solid var(--line)}
nav .wrap{display:flex; padding:0}
nav button{flex:1; background:none; border:none; color:var(--dim);
  padding:11px 0 max(11px, env(safe-area-inset-bottom)); cursor:pointer; font-family:'Saira';
  position:relative; transition:color .15s}
nav button.on{color:var(--fluo)}
nav button.on::before{content:""; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:30px; height:3px; border-radius:0 0 3px 3px; background:var(--fluo)}
nav .ico{height:34px; display:flex; align-items:center; justify-content:center}
nav .ico svg{width:32px; height:32px}
nav .lab{font-size:13px; font-weight:700; margin-top:4px; white-space:nowrap}
.rolehead{font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  font-weight:800; padding:12px 4px 6px}
.card{background:var(--card); border-radius:14px; margin-bottom:8px; overflow:hidden}
.prow{display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; transition:background .12s}
.prow:active{background:var(--cardhi)}
.rball{width:32px; height:32px; border-radius:50%; background:var(--bg2);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:12px; flex-shrink:0; border:1.5px solid}
.pmain{flex:1; min-width:0}
.pname{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.pteam{font-size:11px; color:var(--dim); font-weight:400; margin-left:6px}
.chip{font-size:10px; font-weight:800; border-radius:99px; padding:1px 7px; margin-left:5px; border:1px solid}
.chip.rig{color:var(--amber); border-color:var(--amber)}
.chip.out{color:var(--red); border-color:var(--red)}
.bar{height:5px; border-radius:99px; background:var(--line); margin-top:5px; position:relative}
.bar i{position:absolute; left:0; top:0; bottom:0; border-radius:99px; transition:width .35s ease}
.pnum{text-align:right; flex-shrink:0}
.pnum .v{font-size:18px; font-weight:900; font-variant-numeric:tabular-nums}
.pnum .l{font-size:9px; color:var(--dim)}
.pedit{padding:4px 14px 14px; font-size:13px; color:var(--dim); border-top:1px solid var(--line)}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:2px 14px; margin:8px 0; font-variant-numeric:tabular-nums}
.grid2 b{color:var(--chalk)}
input[type=range]{width:100%; accent-color:var(--fluo); height:26px}
.togglerow{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap}
.tog{padding:7px 12px; border-radius:9px; font:700 12px 'Saira'; cursor:pointer;
  background:var(--bg2); color:var(--dim); border:1px solid var(--line)}
.tog.on{color:var(--bg); border-color:transparent}
.tog.on.red{background:var(--red)} .tog.on.amber{background:var(--amber)}
.tog.del{color:var(--red); border-color:var(--red); margin-left:auto}
.search{width:100%; background:var(--bg2); border:1px solid var(--line); color:var(--chalk);
  border-radius:12px; padding:12px 14px; font:600 15px 'Saira'; margin:10px 0 6px}
.search:focus{outline:2px solid var(--fluo)}
.hint{font-size:12px; color:var(--dim); padding:4px}
.srow{display:flex; align-items:center; gap:10px; padding:9px 12px}
.addbtn{background:var(--fluo); color:var(--bg); border:none; width:34px; height:34px;
  border-radius:10px; font-size:20px; font-weight:900; cursor:pointer; flex-shrink:0}
.addbtn:disabled{background:var(--line); color:var(--dim)}
.counter{display:flex; gap:6px; margin:8px 0; font-size:12px; font-variant-numeric:tabular-nums}
.counter span{background:var(--card); border-radius:8px; padding:4px 9px; color:var(--dim)}
.counter span.full{color:var(--fluo)}
.match{display:flex; align-items:center; padding:12px 16px}
.match .t{flex:1; font-weight:700}
.match .t.right{text-align:right}
.match .d{font-size:12px; font-variant-numeric:tabular-nums; margin:0 6px}
.match .vs{font-size:11px; color:var(--dim); padding:0 6px}
.pos{color:var(--fluo)} .neg{color:var(--red)}
.note{background:var(--bg2); border-radius:12px; padding:12px 14px; font-size:13px;
  color:var(--dim); line-height:1.5; margin-top:10px}
.modscroll{display:flex; gap:8px; overflow-x:auto; padding:12px 2px; scrollbar-width:none}
.modscroll::-webkit-scrollbar{display:none}
.modbtn{flex-shrink:0; border-radius:12px; padding:8px 13px; text-align:center; cursor:pointer;
  background:var(--card); color:var(--chalk); border:1px solid var(--line); font-family:'Saira'}
.modbtn.on{background:var(--fluo); color:var(--bg); border-color:var(--fluo)}
.modbtn .n{font-weight:900; font-size:15px}
.modbtn .e{font-size:11px; font-variant-numeric:tabular-nums; opacity:.75}
.bighead{display:flex; justify-content:space-between; align-items:baseline; padding:12px 14px 0}
.bighead .l{font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--dim)}
.bighead .v{font-size:24px; font-weight:900; font-variant-numeric:tabular-nums}
.mcgrid{display:grid; grid-template-columns:1fr 1fr 1fr; text-align:center; padding:10px 0 4px;
  font-variant-numeric:tabular-nums}
.mcgrid .v{font-size:18px; font-weight:900}
.mcgrid .l{font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim)}
.thres{border-top:1px solid var(--line); margin:10px 14px 0; padding:12px 0 14px}
.thres .row{display:flex; justify-content:space-between; align-items:baseline; font-size:14px; color:var(--dim)}
.thres .p{font-size:24px; font-weight:900; font-variant-numeric:tabular-nums}
.center{text-align:center; padding:22px 16px}
.center .big{font-size:34px}
.empty{padding:40px 20px; text-align:center; color:var(--dim); line-height:1.6}
.ill{width:112px; height:112px; display:block; margin:0 auto 14px; opacity:.95}
.sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
  display:flex; align-items:flex-end; justify-content:center}
.sheet{background:var(--bg2); width:100%; max-width:520px; border-radius:18px 18px 0 0;
  padding:20px; max-height:80vh; overflow-y:auto; font-size:14px; line-height:1.55; color:var(--dim)}
.sheet h3{color:var(--chalk); margin:0 0 10px; font-size:18px}
.sheet b{color:var(--fluo)}
.updated{font-size:10px; color:var(--dim); text-align:center; padding:6px 0 2px}
.importbar{display:flex; align-items:center; gap:10px; padding:8px 3px 4px; flex-wrap:wrap}
.importbar .myteam{font-size:12px; color:var(--dim)}
.importbar .myteam b{color:var(--fluo)}
.leaguebar{display:flex; gap:6px; overflow-x:auto; padding:10px 3px 2px; scrollbar-width:none}
.leaguebar::-webkit-scrollbar{display:none}
.lchip{flex-shrink:0; background:var(--card); color:var(--chalk); border:1px solid var(--line);
  border-radius:99px; padding:6px 13px; font:700 12px 'Saira'; cursor:pointer; white-space:nowrap}
.lchip.on{background:var(--fluo); color:var(--bg); border-color:var(--fluo)}
.lchip.add{color:var(--fluo)}
.lchip.del{color:var(--red); border-color:var(--red); font-size:11px; padding:5px 10px}
.lchip.chg{font-size:10px; padding:3px 8px; color:var(--fluo); border-color:var(--line)}
.teampick{display:flex; justify-content:space-between; align-items:center; width:100%;
  background:var(--bg2); color:var(--chalk); border:1px solid var(--line); border-radius:10px;
  padding:11px 13px; margin-top:6px; font:700 14px 'Saira'; cursor:pointer}
.teampick:active{background:var(--cardhi)}
.teampick .tp-n{font-size:11px; color:var(--dim); font-weight:600}
.oppsel{width:100%; background:var(--card); color:var(--chalk); border:1px solid var(--line);
  border-radius:12px; padding:12px 14px; font:700 15px 'Saira'; -webkit-appearance:none; appearance:none}
.vsrow{display:flex; align-items:center; text-align:center}
.vsside{flex:1; min-width:0}
.vsname{font-weight:800; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.vstot{font-size:30px; font-weight:900; font-variant-numeric:tabular-nums; margin-top:2px}
.vsmid{flex:0 0 96px; padding:0 4px}
.wp{font-size:26px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1}
.wplab{font-size:9px; text-transform:uppercase; letter-spacing:.14em; color:var(--dim)}
.vsmod{font-size:10px; color:var(--dim); margin-top:5px}
.cmpgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px}
.cmphead{font-size:11px; text-transform:uppercase; letter-spacing:.1em; font-weight:800; color:var(--dim); margin-bottom:6px}
.minixi{display:flex; flex-direction:column; gap:3px}
.mline{display:flex; align-items:center; gap:6px; font-size:12px}
.mrole{font-weight:900; width:14px; flex-shrink:0}
.mname{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mval{font-weight:800; font-variant-numeric:tabular-nums; flex-shrink:0}
.mkhint{font-size:13px; color:var(--dim); padding:2px 4px 8px; line-height:1.4}
.mkline{display:flex; align-items:center; gap:8px; padding:6px 10px}
.mkteam{font-size:11px; color:var(--dim); font-weight:400}
.mkstat{text-align:center; font-weight:800; font-variant-numeric:tabular-nums; font-size:14px; flex-shrink:0; min-width:38px}
.mkstat .mksub{display:block; font-size:8px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:.06em}
.mkdelta{font-weight:900; font-variant-numeric:tabular-nums; font-size:13px; flex-shrink:0; min-width:42px; text-align:right}
.mktag{font-size:9px; font-weight:800; border:1px solid; border-radius:99px; padding:1px 6px; flex-shrink:0}
.mkarrow{font-size:11px; color:var(--dim); text-align:center; padding:2px 0}
svg{display:block}
</style>
</head>
<body>
<header><div class="wrap row">
  <div>
    <h1>FANT<span class="fluo">ASSIST</span><sup class="ver">2.0</sup></h1>
    <div class="sub" id="subtitle">caricamento dati…</div>
  </div>
  <button class="btn" onclick="openMetodo()">Metodo ƒ(x)</button>
</div></header>

<main class="wrap" id="main"></main>
<input type="file" id="leaguefile" accept=".xlsx,.xls" style="display:none" onchange="onLeagueFile(this)">

<nav><div class="wrap">
  <button data-tab="rosa"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3 L4 6 L6.2 10.2 L8 9.2 V21 H16 V9.2 L17.8 10.2 L20 6 L15 3"/><path d="M9 3 a3.2 3.2 0 0 0 6 0"/></svg></div><div class="lab">Rosa</div></button>
  <button data-tab="giornata"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M8 2.5 V6 M16 2.5 V6 M3 10 H21"/><circle cx="8.5" cy="14.5" r="1.1" fill="currentColor" stroke="none"/><circle cx="12" cy="14.5" r="1.1" fill="currentColor" stroke="none"/></svg></div><div class="lab">Giornata</div></button>
  <button data-tab="formazione"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3.5" width="18" height="17" rx="2.5"/><path d="M3 12 H21"/><circle cx="12" cy="12" r="3"/><path d="M9 3.5 V6 H15 V3.5 M9 20.5 V18 H15 V20.5"/></svg></div><div class="lab">Formazione</div></button>
  <button data-tab="sfida"><div class="ico"><svg viewBox="0 0 24 24" fill="none"><g transform="translate(2.70,18.75) scale(0.0196,-0.0196)" fill="currentColor"><path transform="translate(0,0)" d="M120 0 5 688H187L247 184H258L315 688H494L379 0Z"/>
<path transform="translate(499,0)" d="M36 11V147Q129 140 173 140Q204 140 218.0 142.0Q232 144 238 151Q244 157 246.0 168.0Q248 179 248 199Q248 229 244.0 241.5Q240 254 228.0 260.0Q216 266 185 271L100 287Q58 295 40.5 344.5Q23 394 23 484Q23 572 49.5 618.5Q76 665 121.5 680.5Q167 696 236 696Q288 696 332.0 690.0Q376 684 401 678V541Q341 548 278 548Q249 548 235.5 546.5Q222 545 215 539Q208 533 205.5 522.0Q203 511 203 490Q203 466 205.5 455.0Q208 444 216.0 439.0Q224 434 243 430L316 416Q350 409 373.5 394.0Q397 379 412 341Q428 297 428 223Q428 122 402.5 72.0Q377 22 335.0 7.0Q293 -8 225 -8Q179 -8 126.0 -2.5Q73 3 36 11Z"/></g></svg></div><div class="lab">Sfida</div></button>
  <button data-tab="mercato"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5 H17"/><path d="M13.5 5 L17 8.5 L13.5 12"/><path d="M20.5 15.5 H7"/><path d="M10.5 12 L7 15.5 L10.5 19"/></svg></div><div class="lab">Mercato</div></button>
  <button data-tab="fattorec"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7.4" r="3.5" fill="currentColor" stroke="none"/><circle cx="16.6" cy="12" r="3.5" fill="currentColor" stroke="none"/><circle cx="12" cy="16.6" r="3.5" fill="currentColor" stroke="none"/><circle cx="7.4" cy="12" r="3.5" fill="currentColor" stroke="none"/><path d="M12.5 16 C13 19 14 20.5 16.5 21.5"/></svg></div><div class="lab">Fattore C</div></button>
</div></nav>

<div id="sheet"></div>

<script>
"use strict";
/* ============ FANTASSIST — motore probabilistico ============ */
const ROLES = ["P","D","C","A"];
const ROLE_LABEL = {P:"Portieri", D:"Difensori", C:"Centrocampisti", A:"Attaccanti"};
const ROLE_COLOR = {P:"var(--amber)", D:"var(--cyan)", C:"var(--chalk)", A:"var(--fluo)"};
const ROLE_MAX = {P:3, D:8, C:8, A:6};
/* ============================================================
   COSTANTI DEL MOTORE — taratura del 17/07/2026
   Misurate su 10.504 fantavoti reali (Serie A 2025-26, 37 giornate)
   incrociati con Understat. Vedi METODO.md, Parte 3.
   ============================================================ */

// Volatilità del fantavoto per ruolo (σ). MISURATE.
const SIGMA = {P:1.55, D:1.07, C:1.33, A:1.90};

// Fantamedia media della popolazione per ruolo. MISURATI.
const PRIOR = {P:5.02, D:5.99, C:6.20, A:6.53};

// Forza dello shrinkage, per ruolo. Bayes empirico: K* = σ²(rumore) / σ²(vere differenze).
// Il rumore di giornata è 10-28× le vere differenze tra giocatori dello stesso ruolo:
// per questo si restringe molto più di quanto (K=8) assumessi prima.
const K_SHRINK = {P:28, D:16, C:15, A:19};

// Forza della PROPRIA squadra (γ). Sopravvive al controllo per la fantamedia passata
// in ogni ruolo → non è doppio conteggio. Applicata a (forza − 0,5), quindi ±γ/2.
const GAMMA_TEAM = {P:0.476, D:0.432, C:0.436, A:0.464};

// Forza dell'AVVERSARIO. Fortemente dipendente dal ruolo: un portiere è colpito
// 2,3× più di un centrocampista. Applicata a (forza_avv − 0,5).
const OPP_W = {P:-1.018, D:-0.534, C:-0.444, A:-0.891};

// Scarto casa−trasferta. Applicato a (casa − 0,5), quindi ±HOME/2 ≈ ±0,08.
// La versione precedente (±0,15) raddoppiava il vantaggio del campo.
const HOME_W = {P:0.167, D:0.172, C:0.144, A:0.155};

// NON ricalibrate: RIG_BONUS (campione n<10, troppo fragile) e BENCH_FV
// (va ripensato in funzione delle regole di sostituzione della lega, non ritarato).
const BENCH_FV = 4.0, RIG_BONUS = 0.3, N_SIM = 3000;
const MODULES = [
  {name:"3-4-3", d:3, c:4, a:3}, {name:"4-3-3", d:4, c:3, a:3},
  {name:"4-4-2", d:4, c:4, a:2}, {name:"3-5-2", d:3, c:5, a:2},
  {name:"5-3-2", d:5, c:3, a:2}, {name:"5-4-1", d:5, c:4, a:1},
  {name:"4-5-1", d:4, c:5, a:1},
];

/* Pesi bonus-performance MISURATI su Serie A 2025-26 (7270 osservazioni,
   regressione standardizzata FV~segnali_p90 al netto della forma passata).
   bonus_FV = beta · FV_sd(ruolo) · clamp((valore−media)/sd, −2, +2) */
const PERF_W = {
  cap: 2.0,
  FV_sd: { A: 1.895, C: 1.328, D: 1.071 },
  ruoli: {
    A: { shots_p90: { beta: 0.112, mean: 2.451, sd: 0.943 }, xa_p90: { beta: 0.0, mean: 0.1425, sd: 0.1015 } },
    C: { shots_p90: { beta: 0.103, mean: 1.357, sd: 0.7967 }, xa_p90: { beta: 0.0, mean: 0.1134, sd: 0.091 } },
    D: { shots_p90: { beta: 0.051, mean: 0.6181, sd: 0.3926 }, xa_p90: { beta: 0.077, mean: 0.0678, sd: 0.0843 } },
    P: {},
  },

function syncActive(){
  const L = S.currentLeague && S.leagues[S.currentLeague];
  if(L){ S.roster = L.roster; S.leagueRosters = L.rosters; S.myTeamName = L.myTeam; }
  else { S.roster = S.standalone; S.leagueRosters = {}; S.myTeamName = null; }
}

/* ---------- persistenza ---------- */
function saveLocal(){
  if(S.currentLeague && S.leagues[S.currentLeague]) S.leagues[S.currentLeague].myTeam = S.myTeamName;
  localStorage.setItem("fantassist", JSON.stringify(
    {threshold:S.threshold, leagues:S.leagues, currentLeague:S.currentLeague, standalone:S.standalone}));
}
function loadLocal(){
  try{
    const d = JSON.parse(localStorage.getItem("fantassist") || "{}");
    if(d.threshold) S.threshold = d.threshold;
    if(d.standalone) S.standalone = d.standalone;
    if(d.leagues && Object.keys(d.leagues).length){
      S.leagues = d.leagues; S.currentLeague = d.currentLeague || Object.keys(d.leagues)[0];
    } else if(d.leagueRosters && Object.keys(d.leagueRosters).length){
      // migrazione dal vecchio formato a lega singola
      const nome = "La mia lega";
      S.leagues[nome] = {rosters:d.leagueRosters, myTeam:d.myTeamName||null, roster:Array.isArray(d.roster)?d.roster:[]};
      S.currentLeague = nome;
    } else if(Array.isArray(d.roster)){
      S.standalone = d.roster;
    }
    syncActive();
  }catch(e){}
}

/* ---------- caricamento dati pipeline ---------- */
async function getJSON(name){
  const r = await fetch("data/" + name, {cache:"no-store"});
  if(!r.ok) throw new Error(name + ": " + r.status);
  return r.json();
}
const normName = s => (s||"").toLowerCase().normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");

async function loadData(){
  const res = await Promise.allSettled([
    getJSON("players.json"), getJSON("classifica.json"), getJSON("calendario.json"),
    getJSON("rigoristi.json"), getJSON("indisponibili.json"), getJSON("meta.json"),
    getJSON("understat.json"),
  ]);
  const [pl, cl, cal, rig, ind, meta, us] = res.map(r => r.status==="fulfilled" ? r.value : null);

  if(pl){
    S.db = pl.giocatori.filter(p => p.id && p.nome);
    S.db.forEach(p => S.byId.set(p.id, p));
  }
  if(cl){
    // mappa nome classifica → slug squadra dei giocatori
    const slugs = [...new Set(S.db.map(p => p.squadra))];
    cl.classifica.forEach(row => {
      const n = normName(row.squadra);
      const slug = slugs.find(s => n.includes(normName(s)) || normName(s).includes(n));
      if(slug) S.points[slug] = row.punti;
    });
  }
  if(cal) S.fixtures = cal.partite || [];
  if(rig) S.rigoristi = rig.rigoristi || {};
  if(ind) S.indisponibili = ind.indisponibili || {};
  if(us && us.giocatori){                      // feed offensivo: { giocatori: { cod: {shots_p90, xa_p90} } }
    S.understat = us.giocatori;
  }
  S.meta = meta;

  const dt = pl ? new Date(pl.aggiornato) : null;
  document.getElementById("subtitle").textContent = pl
    ? `${S.db.length} giocatori · dati ${dt.toLocaleDateString("it-IT")}`
    : "⚠ dati non raggiungibili";
}

/* ---------- motore ---------- */
function playerSlugOf(p){                    // slug del giocatore dal nome (per rigoristi/indisponibili)
  return normName(p.nome).replace(/\./g,"");
}
function ptsRange(){
  const v = Object.values(S.points);
  return v.length ? [Math.min(...v), Math.max(...v)] : [0, 1];
}
function strength(teamSlug){
  const [lo, hi] = ptsRange();
  const p = S.points[teamSlug];
  return p == null || hi === lo ? 0.5 : (p - lo) / (hi - lo);
}
function matchInfo(teamSlug){
  for(const f of S.fixtures){
    if(f.casa === teamSlug) return {opp:f.trasferta, home:true};
    if(f.trasferta === teamSlug) return {opp:f.casa, home:false};
  }
  return null;
}
/* Δ della giornata: dipende dal RUOLO, perché avversario e campo non colpiscono tutti uguale.
   A campionato fermo (nessuna partita) vale 0; senza classifica strength()=0,5 → contributo nullo. */
function calAdj(teamSlug, role){
  const m = matchInfo(teamSlug);
  if(!m) return {adj:0, opp:null, home:null};    // campionato fermo o squadra a riposo
  const adj = HOME_W[role] * (m.home ? .5 : -.5)
            + OPP_W[role]  * (strength(m.opp) - 0.5);
  return {adj, opp:m.opp, home:m.home};
}
function calAdjAvg(teamSlug){                    // media sui ruoli, per la vista Giornata
  const m = matchInfo(teamSlug);
  if(!m) return {adj:0, opp:null, home:null};
  const adj = ROLES.reduce((s,r) => s + calAdj(teamSlug, r).adj, 0) / ROLES.length;
  return {adj, opp:m.opp, home:m.home};
}
/* Rating del giocatore: shrinkage bayesiano verso il prior di ruolo, con K per ruolo. */
function shrunk(st){
  const role = roleOf(st), pg = st.pv || 0, fm = st.fm ?? PRIOR[role], K = K_SHRINK[role];
  return (pg*fm + K*PRIOR[role]) / (pg + K);
}
/* Forza della PROPRIA squadra. È un attributo del giocatore (varia 0,005 dentro la stagione),
   non un fattore di giornata: entra nel rating, non nel Δ calendario.
   Senza classifica caricata strength() restituisce 0,5 → il termine si annulla da solo. */
function teamAdj(st){
  return GAMMA_TEAM[roleOf(st)] * (strength(st.squadra) - 0.5);
}
function roleOf(st){ return st.ruolo || "C"; }
function perfBonus(st){                          // bonus da statistiche offensive Understat
  const role = roleOf(st), w = PERF_W.ruoli[role], u = S.understat[st.id];
  if (!w || !u) return { val: 0, has: false };   // nessun feed (es. campionato fermo) → 0
  const fvsd = PERF_W.FV_sd[role] || 0;
  let b = 0, used = false;
  for (const sig of ["shots_p90", "xa_p90"]) {
    const c = w[sig];
    if (!c || !c.beta || u[sig] == null) continue;
    const z = Math.max(-PERF_W.cap, Math.min(PERF_W.cap, (u[sig] - c.mean) / c.sd));
    b += c.beta * fvsd * z; used = true;
  }
  return { val: b, has: used };
}
function expFV(r){                               // r = elemento roster
  const st = S.byId.get(r.id);
  const role = roleOf(st);
  const cal = calAdj(st.squadra, role);
  const team = teamAdj(st);                      // contesto squadra (costante nella stagione)
  const perf = perfBonus(st);
  const base = shrunk(st) + team;                // rating di giocatore = fantamedia ristretta + squadra
  return { val: base + cal.adj + (r.rig ? RIG_BONUS : 0) + perf.val,
           cal, base, team, rating: shrunk(st), st, perf };
}
function slotEV(r){
  return (r.pTit/100) * expFV(r).val + (1 - r.pTit/100) * BENCH_FV;
}
function rosterByRole(role){
  return S.roster.filter(r => roleOf(S.byId.get(r.id)) === role);
}
function bestLineup(mod){
  const avail = S.roster.filter(r => !r.sq && !r.inf);
  const by = role => avail.filter(r => roleOf(S.byId.get(r.id)) === role)
    .sort((a,b) => slotEV(b) - slotEV(a));
  const xi = [...by("P").slice(0,1), ...by("D").slice(0,mod.d),
              ...by("C").slice(0,mod.c), ...by("A").slice(0,mod.a)];
  const need = 1 + mod.d + mod.c + mod.a;
  const bench = {};
  ROLES.forEach(role => bench[role] = by(role).filter(r => !xi.includes(r)));
  return {xi, bench, complete: xi.length === need,
          ev: xi.reduce((s,r) => s + slotEV(r), 0) - (xi.length === need ? 0 : 99)};
}
function gauss(){
  let u = 0, v = 0;
  while(!u) u = Math.random();
  while(!v) v = Math.random();
  return Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
}
function monteCarlo(lu){
  const totals = new Float64Array(N_SIM);
  const xi = lu.xi.map(r => ({p:r.pTit/100, e:expFV(r).val, s:SIGMA[roleOf(S.byId.get(r.id))], role:roleOf(S.byId.get(r.id))}));
  const bench = {};
  ROLES.forEach(role => bench[role] = lu.bench[role].map(r =>
    ({e:expFV(r).val, s:SIGMA[role]})));
  for(let i=0; i<N_SIM; i++){
    let tot = 0; const used = {P:0,D:0,C:0,A:0};
    for(const x of xi){
      if(Math.random() < x.p) tot += x.e + x.s*gauss();
      else{
        const sub = bench[x.role][used[x.role]++];
        tot += sub ? sub.e*0.97 + sub.s*gauss() : 0;
      }
    }
    totals[i] = tot;
  }
  const s = Array.from(totals).sort((a,b) => a-b);
  const q = x => s[Math.floor(x*(N_SIM-1))];
  return {sorted:s, mean:s.reduce((a,b)=>a+b,0)/N_SIM, p10:q(.1), p50:q(.5), p90:q(.9)};
}

/* ---------- LEGA: import rose + confronto ---------- */
function teamMatch(abbr, slug){       // per risolvere le omonimie con la squadra
  const a=normName(abbr), b=normName(slug);
  if(!a||!b) return false;
  return b.startsWith(a.slice(0,3)) || a.startsWith(b.slice(0,3)) || b.includes(a) || a.includes(b);
}
function buildNameIndex(){
  const idx=new Map();
  for(const p of S.db){
    const k=normName(p.nome);
    if(!idx.has(k)) idx.set(k,[]);
    idx.get(k).push(p);
  }
  return idx;
}
function parseLeagueWorkbook(buf){
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets["TutteLeRose"]||wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  const RS=new Set(["P","D","C","A"]); const teams={}; let league=null;
  for(const off of [0,5]){
    let cur=null;
    for(const r of rows){
      const a=(r[off]??"").toString().trim(), b=(r[off+1]??"").toString().trim();
      if(!a) continue;
      const low=a.toLowerCase();
      if(low.startsWith("rose lega")){ if(!league) league=a.replace(/rose lega/i,"").trim()||null; continue; }
      if(RS.has(a) && b){ if(cur) teams[cur].push({ruolo:a, nome:b, squadra:(r[off+2]??"").toString().trim()}); }
      else if(low!=="ruolo" && !a.startsWith("http") && !a.startsWith("*")){
        cur=a; if(!teams[cur]) teams[cur]=[];
      }
    }
  }
  const out={}; for(const k in teams){ if(teams[k].length>=15) out[k]=teams[k]; }
  return {league, teams:out};
}
function matchLeagueRoster(players, idx){
  const cods=[], missed=[];
  for(const p of players){
    const c=idx.get(normName(p.nome))||[];
    let ch=null;
    if(c.length===1) ch=c[0];
    else if(c.length>1) ch=c.find(x=>teamMatch(p.squadra,x.squadra))||c[0];
    if(ch && ch.id!=null) cods.push(ch.id); else missed.push(p.nome);  // niente id → segnalato, non sparito
  }
  return {cods, missed};
}
function triggerImport(){ el("leaguefile").click(); }
function onLeagueFile(input){
  const file=input.files && input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const {league, teams}=parseLeagueWorkbook(e.target.result);
      if(!Object.keys(teams).length) throw new Error("nessuna rosa riconosciuta");
      const idx=buildNameIndex(); const rosters={}, report={};
      for(const [name,players] of Object.entries(teams)){
        const {cods,missed}=matchLeagueRoster(players,idx);
        rosters[name]=cods; report[name]={n:players.length, matched:cods.length, missed:missed.length, missedNames:missed};
      }
      // nome lega dal file, o generato se assente/duplicato
      let lname=league || ("Lega " + (Object.keys(S.leagues).length+1));
      if(S.leagues[lname] && league) lname=league;            // stesso nome → aggiorna quella lega
      else if(S.leagues[lname]) lname=lname+" ("+(Object.keys(S.leagues).length+1)+")";
      S.leagues[lname]={rosters, myTeam:(S.leagues[lname]?S.leagues[lname].myTeam:null), roster:(S.leagues[lname]?S.leagues[lname].roster:[])};
      S.currentLeague=lname; syncActive();
      S._importReport=report; saveLocal(); render();
    }catch(err){ alert("Non riesco a leggere il file: "+err.message); }
  };
  reader.readAsArrayBuffer(file);
  input.value="";
}
function switchLeague(name){
  S.currentLeague=name; S.oppName=null; S._importReport=null; syncActive(); saveLocal(); render();
}
function changeTeam(){
  const L=S.currentLeague && S.leagues[S.currentLeague]; if(!L) return;
  L.myTeam=null; L.roster=[]; syncActive(); saveLocal(); render();
}
function deleteLeague(name){
  if(!confirm("Rimuovere la lega \""+name+"\"?")) return;
  delete S.leagues[name];
  S.currentLeague=Object.keys(S.leagues)[0]||null;
  syncActive(); saveLocal(); render();
}
function loadMyTeam(name){
  const L=S.leagues[S.currentLeague]; if(!L) return;
  const cods=L.rosters[name]||[];
  L.myTeam=name;
  L.roster=cods.map(id=>{
    const st=S.byId.get(id), f=st?autoFlags(st):{sq:false,inf:false,rig:false};
    return {id, pTit:75, rig:f.rig, sq:f.sq, inf:f.inf};
  });
  syncActive(); S._importReport=null; saveLocal(); S.tab="rosa"; render();
}
// miglior formazione per una rosa qualunque (lista di elementi {id,pTit,rig,sq,inf})
function bestLineupFrom(roster, mod){
  const avail=roster.filter(r=>!r.sq&&!r.inf);
  const by=role=>avail.filter(r=>roleOf(S.byId.get(r.id))===role).sort((a,b)=>slotEV(b)-slotEV(a));
  const xi=[...by("P").slice(0,1),...by("D").slice(0,mod.d),...by("C").slice(0,mod.c),...by("A").slice(0,mod.a)];
  const need=1+mod.d+mod.c+mod.a; const bench={};
  ROLES.forEach(role=>bench[role]=by(role).filter(r=>!xi.includes(r)));
  return {xi,bench,complete:xi.length===need, ev:xi.reduce((s,r)=>s+slotEV(r),0)-(xi.length===need?0:99)};
}
function bestOf(roster){
  const r=MODULES.map(m=>({mod:m,lu:bestLineupFrom(roster,m)})).filter(x=>x.lu.complete)
    .sort((a,b)=>b.lu.ev-a.lu.ev);
  return r[0]||null;
}
function oppRosterOf(name){
  return (S.leagueRosters[name]||[]).map(id=>{
    const st=S.byId.get(id), f=st?autoFlags(st):{sq:false,inf:false,rig:false};
    return {id, pTit:75, rig:f.rig, sq:f.sq, inf:f.inf};
  });
}
function winProb(a, b, k=4000){       // P(a batte b) da due distribuzioni simulate
  let w=0,e=0; const na=a.length, nb=b.length;
  for(let i=0;i<k;i++){ const x=a[(Math.random()*na)|0], y=b[(Math.random()*nb)|0];
    if(x>y) w++; else if(x===y) e++; }
  return {win:w/k, draw:e/k};
}

/* ---------- helper UI ---------- */
const fmt = (x,d=2) => x==null ? "–" : (Math.round(x*10**d)/10**d).toFixed(d);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const el = id => document.getElementById(id);
function signedSpan(x, d=2){
  return `<span class="${x>=0?"pos":"neg"}">${x>=0?"+":""}${fmt(x,d)}</span>`;
}

/* ---------- TAB: ROSA ---------- */
let searchQ = "", openId = null;
function autoFlags(st){
  const team = st.squadra, ps = playerSlugOf(st);
  const inList = arr => (arr||[]).some(s => normName(s).replace(/\./g,"") === ps);
  return {sq:false, inf: inList(S.indisponibili[team]),
          rig: inList((S.rigoristi[team]||[]).slice(0,1))};
}
function addPlayer(id){
  const st = S.byId.get(id);
  const role = roleOf(st);
  if(S.roster.some(r => r.id === id)) return;
  if(rosterByRole(role).length >= ROLE_MAX[role]) return;
  const f = autoFlags(st);
  S.roster.push({id, pTit:75, rig:f.rig, sq:f.sq, inf:f.inf});
  saveLocal(); render();
}
function setRoster(arr){       // aggiorna la vista attiva E il contenitore di appoggio (lega o standalone)
  S.roster = arr;
  if(S.currentLeague && S.leagues[S.currentLeague]) S.leagues[S.currentLeague].roster = arr;
  else S.standalone = arr;
}
function removePlayer(id){
  setRoster(S.roster.filter(r => r.id !== id));
  saveLocal(); render();
}
function patch(id, k, v){
  const r = S.roster.find(r => r.id === id);
  if(r){ r[k] = v; saveLocal(); render(); }
}
function renderRosa(){
  const counts = ROLES.map(role =>
    `<span class="${rosterByRole(role).length>=ROLE_MAX[role]?"full":""}">${role} ${rosterByRole(role).length}/${ROLE_MAX[role]}</span>`).join("");

  // selettore leghe (se importate) + pulsante import + eventuale selettore squadra
  const leagueNames = Object.keys(S.leagues);
  let importHtml = "";
  if(leagueNames.length){
    importHtml += `<div class="leaguebar">${leagueNames.map(n=>
      `<button class="lchip ${n===S.currentLeague?"on":""}" onclick="switchLeague('${n.replace(/'/g,"\\'")}')">${esc(n)}</button>`).join("")}
      <button class="lchip add" onclick="triggerImport()">＋ lega</button></div>`;
  }
  importHtml += `<div class="importbar">
      ${leagueNames.length?"":`<button class="btn" onclick="triggerImport()">📥 Importa rose da file</button>`}
      ${S.currentLeague?`<span class="myteam">${esc(S.currentLeague)}${S.myTeamName?` · <b>${esc(S.myTeamName)}</b> <button class="lchip chg" onclick="changeTeam()">cambia</button>`:""}</span>`:""}
      ${S.currentLeague?`<button class="lchip del" onclick="deleteLeague('${S.currentLeague.replace(/'/g,"\\'")}')">rimuovi lega</button>`:""}
    </div>`;
  if(S.currentLeague && S.leagues[S.currentLeague] && !S.myTeamName){
    const L=S.leagues[S.currentLeague];
    const rep=S._importReport;   // conteggi appaiati se disponibili (subito dopo l'import)
    const teams=Object.keys(L.rosters);
    importHtml += `<div class="card" style="padding:12px; margin-bottom:8px">
      <div style="font-weight:700; margin-bottom:8px">${esc(S.currentLeague)} — tocca la tua squadra:</div>
      ${teams.map(t=>{const r=rep&&rep[t]; const n=(L.rosters[t]||[]).length;
        return `<button class="teampick" onclick="loadMyTeam('${t.replace(/'/g,"\\'")}')">
          <span>${esc(t)}</span><span class="tp-n">${r?`${r.matched}/${r.n}${r.missed?` · ${r.missed} n/d`:""}`:`${n} giocatori`}</span></button>`;}).join("")}
    </div>`;
  }

  let html = importHtml + `<input class="search" id="q" placeholder="Cerca giocatore da aggiungere…"
    value="${esc(searchQ)}" oninput="searchQ=this.value; renderSearchResults()">
    <div class="counter">${counts}</div><div id="results"></div>`;

  if(!S.roster.length){
    html += `<div class="empty">${ill("rosa")}Rosa vuota.<br>Cerca qui sopra i tuoi 25 dell'asta:<br>3 portieri · 8 difensori · 8 centrocampisti · 6 attaccanti</div>`;
  }
  for(const role of ROLES){
    const rows = rosterByRole(role).sort((a,b) => slotEV(b) - slotEV(a));
    if(!rows.length) continue;
    html += `<div class="rolehead" style="color:${ROLE_COLOR[role]}">${ROLE_LABEL[role]}</div>`;
    for(const r of rows){
      const e = expFV(r), st = e.st, out = r.sq || r.inf, open = openId === r.id;
      html += `<div class="card" style="${out?"opacity:.55":""}">
        <div class="prow" onclick="openId = openId===${r.id}?null:${r.id}; render()">
          <div class="rball" style="color:${ROLE_COLOR[role]}; border-color:${ROLE_COLOR[role]}">${role}</div>
          <div class="pmain">
            <div class="pname">${esc(st.nome)}<span class="pteam">${esc(st.squadra)}</span>${
              r.rig?'<span class="chip rig">R</span>':""}${r.sq?'<span class="chip out">SQ</span>':""}${
              r.inf?'<span class="chip out">INF</span>':""}</div>
            <div class="bar"><i style="width:${Math.min(100, e.val/9*100)}%; background:${ROLE_COLOR[role]}"></i></div>
          </div>
          <div class="pnum"><div class="v" style="color:${ROLE_COLOR[role]}">${fmt(e.val)}</div><div class="l">E[fv] · tit ${r.pTit}%</div></div>
        </div>
        ${open ? `<div class="pedit">
          <div class="grid2">
            <div>Rating base: <b>${fmt(e.base)}</b></div>
            <div>FM: <b>${fmt(st.fm)}</b> (${st.pv||0} pv)</div>
            <div>Forza squadra: <b>${e.team ? signedSpan(e.team) : "n/d"}</b></div>
            <div>Δ calendario: <b>${e.cal.opp ? signedSpan(e.cal.adj) : "n/d"}</b></div>
            <div>Performance: <b>${e.perf && e.perf.has ? signedSpan(e.perf.val) : "n/d"}</b></div>
          </div>
          <label>Titolarità: <b style="color:var(--chalk)">${r.pTit}%</b>
            <input type="range" min="0" max="100" step="5" value="${r.pTit}"
              oninput="patch(${r.id},'pTit',+this.value)"></label>
          <div class="togglerow">
            <button class="tog ${r.sq?"on red":""}" onclick="patch(${r.id},'sq',${!r.sq})">Squalificato</button>
            <button class="tog ${r.inf?"on red":""}" onclick="patch(${r.id},'inf',${!r.inf})">Infortunato</button>
            <button class="tog ${r.rig?"on amber":""}" onclick="patch(${r.id},'rig',${!r.rig})">Rigorista</button>
            <button class="tog del" onclick="removePlayer(${r.id})">Rimuovi</button>
          </div>
        </div>` : ""}
      </div>`;
    }
  }
  el("main").innerHTML = html;
  renderSearchResults();
}
function renderSearchResults(){
  const box = el("results");
  if(!box) return;
  const q = normName(searchQ);
  if(q.length < 2){ box.innerHTML = ""; return; }
  const hits = S.db.filter(p => normName(p.nome).includes(q)).slice(0, 15);
  box.innerHTML = hits.map(p => {
    const role = roleOf(p), inRoster = S.roster.some(r => r.id === p.id);
    const full = rosterByRole(role).length >= ROLE_MAX[role];
    return `<div class="card"><div class="srow">
      <div class="rball" style="color:${ROLE_COLOR[role]}; border-color:${ROLE_COLOR[role]}">${role}</div>
      <div class="pmain"><div class="pname">${esc(p.nome)}<span class="pteam">${esc(p.squadra)} · FM ${fmt(p.fm)} · ${p.pv||0} pv</span></div></div>
      <button class="addbtn" ${inRoster||full?"disabled":""} onclick="addPlayer(${p.id})">${inRoster?"✓":"+"}</button>
    </div></div>`;
  }).join("") || `<div class="hint">Nessun risultato per «${esc(searchQ)}»</div>`;
}

/* ---------- TAB: FORMAZIONE ---------- */
function pitchSVG(lu, mod){
  const rows = [["A", mod.a, 66], ["C", mod.c, 164], ["D", mod.d, 262], ["P", 1, 348]];
  const byRole = {P:[],D:[],C:[],A:[]};
  lu.xi.forEach(r => byRole[roleOf(S.byId.get(r.id))].push(r));
  let g = "";
  for(const [role, n, y] of rows){
    byRole[role].slice(0, n).forEach((r, i) => {
      const x = 340/(n+1)*(i+1), st = S.byId.get(r.id), e = expFV(r).val;
      const nm = st.nome.length > 11 ? st.nome.slice(0,10)+"…" : st.nome;
      g += `<circle cx="${x}" cy="${y}" r="15" fill="var(--card)" stroke="${ROLE_COLOR[role]}" stroke-width="2"/>
        <text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" font-weight="800" fill="${ROLE_COLOR[role]}">${fmt(e,1)}</text>
        <text x="${x}" y="${y+30}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--chalk)">${esc(nm)}</text>`;
    });
  }
  return `<svg viewBox="0 0 340 396" style="width:100%; max-height:380px">
    <rect x="8" y="8" width="324" height="380" rx="10" fill="var(--bg2)" stroke="var(--line)"/>
    <line x1="8" y1="30" x2="332" y2="30" stroke="var(--line)"/>
    <circle cx="170" cy="30" r="34" fill="none" stroke="var(--line)"/>
    <rect x="95" y="326" width="150" height="62" fill="none" stroke="var(--line)"/>
    <rect x="135" y="361" width="70" height="27" fill="none" stroke="var(--line)"/>${g}</svg>`;
}
function histSVG(mc){
  const bins = 26, lo = mc.sorted[0], hi = mc.sorted[mc.sorted.length-1];
  const w = (hi-lo)/bins || 1, counts = new Array(bins).fill(0);
  mc.sorted.forEach(v => counts[Math.min(bins-1, Math.floor((v-lo)/w))]++);
  const maxC = Math.max(...counts);
  let bars = "";
  counts.forEach((c, i) => {
    const mid = lo + w*(i+.5), h = c/maxC*80;
    bars += `<rect x="${i*(340/bins)+1}" y="${86-h}" width="${340/bins-2}" height="${Math.max(h,2)}" rx="1.5"
      fill="${mid >= S.threshold ? "var(--fluo)" : "var(--line)"}"/>`;
  });
  return `<svg viewBox="0 0 340 90" style="width:100%; padding:0 14px; box-sizing:border-box">${bars}</svg>`;
}
function renderFormazione(){
  const missing = ROLES.filter(role => !rosterByRole(role).length);
  if(missing.length){
    el("main").innerHTML = `<div class="empty">${ill("formazione")}Per calcolare la formazione servono giocatori
      in tutti i reparti.<br>Mancano: <b style="color:var(--chalk)">${missing.map(r=>ROLE_LABEL[r]).join(", ")}</b><br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai alla Rosa</button></div>`;
    return;
  }
  const ranking = MODULES.map(m => ({mod:m, lu:bestLineup(m)})).sort((a,b) => b.lu.ev - a.lu.ev);
  const sel = S.selMod ? ranking.find(x => x.mod.name === S.selMod) || ranking[0] : ranking[0];
  const mc = monteCarlo(sel.lu);
  const pAbove = mc.sorted.filter(v => v >= S.threshold).length / mc.sorted.length;

  el("main").innerHTML = `
    <div class="modscroll">${ranking.map(x =>
      `<div class="modbtn ${x===sel?"on":""}" onclick="S.selMod='${x.mod.name}'; S.mcSeed++; render()">
        <div class="n">${x.mod.name}</div><div class="e">${x.lu.complete ? fmt(x.lu.ev,1) : "n/d"}</div></div>`).join("")}
    </div>
    <div class="card">
      <div class="bighead">
        <div><div class="l">${sel === ranking[0] ? "Modulo ottimo" : "Modulo scelto"}</div>
          <div class="v" style="color:var(--fluo)">${sel.mod.name}</div></div>
        <div style="text-align:right"><div class="l">totale atteso</div>
          <div class="v">${fmt(mc.mean,1)}</div></div>
      </div>
      <div style="padding:8px">${pitchSVG(sel.lu, sel.mod)}</div>
    </div>
    <div class="card">
      <div class="bighead"><div class="l">Simulazione · ${N_SIM} giornate</div>
        <button class="btn" onclick="S.mcSeed++; render()">↻ Rilancia</button></div>
      ${histSVG(mc)}
      <div class="mcgrid">
        <div><div class="v">${fmt(mc.p10,1)}</div><div class="l">P10</div></div>
        <div><div class="v">${fmt(mc.p50,1)}</div><div class="l">Mediana</div></div>
        <div><div class="v">${fmt(mc.p90,1)}</div><div class="l">P90</div></div>
      </div>
      <div class="thres">
        <div class="row"><span>P(totale ≥ <b style="color:var(--chalk)">${S.threshold}</b>)</span>
          <span class="p" style="color:${pAbove>=.5?"var(--fluo)":"var(--amber)"}">${fmt(pAbove*100,0)}%</span></div>
        <input type="range" min="55" max="85" value="${S.threshold}"
          oninput="S.threshold=+this.value; saveLocal(); render()">
      </div>
    </div>
    ${!S.fixtures.length ? `<div class="note">Campionato fermo: Δ calendario neutro per tutti.</div>` : ""}`;
}

/* ---------- TAB: FATTORE C ---------- */
let fcResult = null;
function spinFC(){
  const avail = S.roster.filter(r => !r.sq && !r.inf);
  const mod = MODULES[Math.floor(Math.random()*MODULES.length)];
  const pick = (role, n) => {
    const pool = avail.filter(r => roleOf(S.byId.get(r.id)) === role);
    for(let i = pool.length-1; i > 0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, n);
  };
  const xi = [...pick("P",1), ...pick("D",mod.d), ...pick("C",mod.c), ...pick("A",mod.a)];
  fcResult = {mod, lu:{xi}};
  render();
}
function renderFattoreC(){
  el("main").innerHTML = `
    <div class="card center">
      ${ill("fattorec")}
      <h3 style="margin:4px 0">Fattore C</h3>
      <p style="color:var(--dim); font-size:14px; margin:4px 0 16px">
        Quando l'algoritmo ti ha tradito tre giornate di fila, resta solo lui.<br>
        Modulo e undici estratti a sorte, come da tradizione.</p>
      <button class="btn primary" ${S.roster.length<11?"disabled":""} onclick="spinFC()">ESTRAI LA FORMAZIONE</button>
      ${S.roster.length<11?'<div class="hint" style="margin-top:8px">Servono almeno 11 giocatori in rosa</div>':""}
    </div>
    ${fcResult ? `<div class="card">
      <div class="bighead" style="justify-content:center; text-align:center">
        <div><div class="l">Il modulo fortunato è</div>
        <div class="v" style="color:var(--amber)">${fcResult.mod.name}</div></div></div>
      <div style="padding:8px">${pitchSVG(fcResult.lu, fcResult.mod)}</div>
    </div>` : ""}`;
}

/* ---------- TAB: SFIDA (confronto con avversario) ---------- */
function miniPitch(best, color){
  if(!best) return `<div class="hint">Rosa incompleta per un modulo valido.</div>`;
  const byRole={P:[],D:[],C:[],A:[]};
  best.lu.xi.forEach(r=>byRole[roleOf(S.byId.get(r.id))].push(r));
  let h=`<div class="minixi">`;
  for(const role of ROLES){
    for(const r of byRole[role]){
      const st=S.byId.get(r.id);
      h+=`<div class="mline"><span class="mrole" style="color:${ROLE_COLOR[role]}">${role}</span>
        <span class="mname">${esc(st?st.nome:r.id)}</span>
        <span class="mval" style="color:${color}">${fmt(expFV(r).val,1)}</span></div>`;
    }
  }
  return h+`</div>`;
}
function renderSfida(){
  const teams=Object.keys(S.leagueRosters);
  if(!teams.length){
    el("main").innerHTML=`<div class="empty">${ill("sfida")}Per il confronto serve prima importare le rose della lega.<br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai a Rosa → Importa</button></div>`;
    return;
  }
  if(!S.myTeamName){
    el("main").innerHTML=`<div class="empty">${ill("sfida")}Indica prima qual è la <b>tua</b> squadra.<br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai a Rosa</button></div>`;
    return;
  }
  const others=teams.filter(t=>t!==S.myTeamName);
  const opp=(S.oppName&&others.includes(S.oppName))?S.oppName:others[0];
  S.oppName=opp;

  const myBest=bestOf(S.roster);
  const oppBest=bestOf(oppRosterOf(opp));
  let head='';
  if(myBest&&oppBest){
    const mMC=monteCarlo(myBest.lu), oMC=monteCarlo(oppBest.lu);
    const wp=winProb(mMC.sorted,oMC.sorted);
    const myWin=wp.win+wp.draw/2;    // metà dei pareggi
    head=`<div class="card" style="padding:14px">
      <div class="vsrow">
        <div class="vsside"><div class="vsname" style="color:var(--fluo)">${esc(S.myTeamName)}</div>
          <div class="vstot">${fmt(mMC.mean,1)}</div></div>
        <div class="vsmid">
          <div class="wp" style="color:${myWin>=.5?"var(--fluo)":"var(--amber)"}">${fmt(myWin*100,0)}%</div>
          <div class="wplab">vittoria</div>
          <div class="vsmod">${myBest.mod.name} · ${oppBest.mod.name}</div>
        </div>
        <div class="vsside"><div class="vsname">${esc(opp)}</div>
          <div class="vstot">${fmt(oMC.mean,1)}</div></div>
      </div>
    </div>`;
  }
  const pick=`<select class="oppsel" onchange="S.oppName=this.value; render()">
    ${others.map(t=>`<option ${t===opp?"selected":""}>${esc(t)}</option>`).join("")}</select>`;

  el("main").innerHTML=`
    <div class="rolehead" style="color:var(--dim)">${esc(S.currentLeague||"")} · Avversario di giornata</div>
    <div style="padding:0 3px 6px">${pick}</div>
    ${head}
    <div class="cmpgrid">
      <div class="card" style="padding:10px"><div class="cmphead" style="color:var(--fluo)">La tua formazione</div>${miniPitch(myBest,"var(--fluo)")}</div>
      <div class="card" style="padding:10px"><div class="cmphead">${esc(opp)}</div>${miniPitch(oppBest,"var(--chalk)")}</div>
    </div>
    <div class="note">La tua formazione usa i tuoi ritocchi (titolarità, squalifiche…); quella avversaria
      parte da impostazioni standard. Probabilità stimata da ${N_SIM} simulazioni per parte.</div>`;
}

/* ---------- TAB: SPUNTI DI MERCATO ---------- */
const MKT_REG = 25;                       // presenze ~ titolare fisso in una stagione
function availab(st){ return Math.min(1, (st.pv||0)/MKT_REG); }
function marketScore(st){                  // qualità × titolarità: chi non gioca non viene consigliato
  return (shrunk(st) + teamAdj(st)) * (0.15 + 0.85*availab(st));
}
function statsReady(){                     // i dati stagionali (fantamedie reali) sono disponibili?
  return S.db.filter(p => (p.fm||0) >= 4).length >= 30;
}
function mkRow(st, tag, tagColor, delta){
  const role=roleOf(st), av=Math.round(availab(st)*100);
  return `<div class="mkline">
    <span class="mrole" style="color:${ROLE_COLOR[role]}">${role}</span>
    <span class="mname">${esc(st.nome)}<span class="mkteam"> ${esc(st.squadra||"")}</span></span>
    <span class="mkstat">${fmt(shrunk(st),2)}<span class="mksub">rating</span></span>
    <span class="mkstat">${st.pv||0}<span class="mksub">pres.</span></span>
    ${delta!=null?`<span class="mkdelta ${delta>=0?"pos":"neg"}">${delta>=0?"+":""}${fmt(delta,2)}</span>`:""}
    ${tag?`<span class="mktag" style="color:${tagColor};border-color:${tagColor}">${tag}</span>`:""}
  </div>`;
}
function renderMercato(){
  if(!S.currentLeague || !S.leagues[S.currentLeague]){
    el("main").innerHTML=`<div class="empty">${ill("mercato")}Gli spunti di mercato servono le rose della lega.<br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai a Rosa → Importa</button></div>`; return;
  }
  if(!S.myTeamName || !S.roster.length){
    el("main").innerHTML=`<div class="empty">${ill("mercato")}Scegli prima la <b>tua</b> squadra in questa lega.<br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai a Rosa</button></div>`; return;
  }
  if(!statsReady()){
    el("main").innerHTML=`<div class="empty">${ill("mercato")}Spunti di mercato pronto, ma servono i dati stagionali.<br><br>
      Al momento le fantamedie e le presenze non sono disponibili (campionato fermo / fuori stagione):
      senza rendimento e titolarità reali i suggerimenti non avrebbero senso.<br><br>
      Il tool si accende da solo appena la nuova stagione produce statistiche. ⚽</div>`; return;
  }
  // svincolati = giocatori con id non presenti in NESSUNA rosa della lega
  const owned=new Set();
  Object.values(S.leagueRosters).forEach(cods=>cods.forEach(c=>owned.add(c)));
  const freeByRole={P:[],D:[],C:[],A:[]};
  for(const p of S.db){ if(p.id==null||owned.has(p.id)) continue; const r=roleOf(p); if(freeByRole[r]) freeByRole[r].push(p); }
  ROLES.forEach(r=>freeByRole[r].sort((a,b)=>marketScore(b)-marketScore(a)));

  // i tuoi peggiori (per punteggio di mercato: scarso rendimento O poca titolarità)
  const mine=S.roster.map(r=>S.byId.get(r.id)).filter(Boolean).slice();
  mine.sort((a,b)=>marketScore(a)-marketScore(b));
  const used=new Set(); const swaps=[];
  for(const st of mine.slice(0,6)){
    const role=roleOf(st);
    const fa=freeByRole[role].find(p=>!used.has(p.id) && marketScore(p)>marketScore(st)+0.05);
    if(fa){ used.add(fa.id); swaps.push({out:st, in:fa}); }
  }

  let html=`<div class="rolehead" style="color:var(--dim)">${esc(S.currentLeague)} · ${esc(S.myTeamName)} — spunti di mercato</div>`;
  if(swaps.length){
    html+=`<div class="mkhint">I tuoi anelli deboli e il miglior svincolato per rimpiazzarli (per rating e titolarità):</div>`;
    for(const s of swaps){
      const d=marketScore(s.in)-marketScore(s.out);
      html+=`<div class="card" style="padding:8px 4px; margin-bottom:8px">
        ${mkRow(s.out,"CEDI","var(--red)")}
        <div class="mkarrow">↓ rimpiazza con</div>
        ${mkRow(s.in,"PRENDI","var(--fluo)", shrunk(s.in)-shrunk(s.out))}
      </div>`;
    }
  } else {
    html+=`<div class="mkhint">Nessun upgrade evidente tra gli svincolati: la tua rosa regge bene. 👌</div>`;
  }

  // esplora i migliori svincolati per ruolo
  const fr=S._mktRole||"A";
  html+=`<div class="rolehead" style="color:var(--dim); margin-top:8px">Migliori svincolati per ruolo</div>
    <div class="leaguebar">${ROLES.map(r=>`<button class="lchip ${r===fr?"on":""}" onclick="S._mktRole='${r}'; render()">${ROLE_LABEL[r]}</button>`).join("")}</div>
    <div class="card" style="padding:8px 4px">
      ${freeByRole[fr].slice(0,12).map(p=>mkRow(p)).join("") || `<div class="hint">Nessuno svincolato in questo ruolo.</div>`}
    </div>
    <div class="note">Punteggio di mercato = rating (fantamedia bayesiana) pesato per la titolarità
      (presenze): un fuoriclasse che gioca poco scende in graduatoria. Svincolato = non presente
      in nessuna rosa della lega selezionata.</div>`;
  el("main").innerHTML=html;
}
