<style>

nav{position:fixed; bottom:0; left:0; right:0; z-index:40;

input[type=range]{width:100%; accent-color:var(--fluo); height:26px}

.cmpgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px}
.cmphead{font-size:11px; text-transform:uppercase; letter-spacing:.1em; font-weight:800; color:var(--dim); margin-bottom:6px}

<body>
<header><div class="wrap row">
  <div>
    <h1>FANT<span class="fluo">ASSIST</span><sup class="ver">2.0</sup></h1>
    <div class="sub" id="subtitle">caricamento dati…</div>
  </div>
  <button class="btn" onclick="openMetodo()">Metodo ƒ(x)</button>
</div></header>

<main class="wrap" id="main"></main>
<input type="file" id="leaguefile" accept=".xlsx,.xls" style="display:none" onchange="onLeagueFile(this)">

<nav><div class="wrap">
  <button data-tab="rosa"><div class="ico">👥</div><div class="lab">Rosa</div></button>
  <button data-tab="giornata"><div class="ico">📅</div><div class="lab">Giornata</div></button>
  <button data-tab="formazione"><div class="ico">⚽</div><div class="lab">Formazione</div></button>
  <button data-tab="sfida"><div class="ico">⚔️</div><div class="lab">Sfida</div></button>
  <button data-tab="fattorec"><div class="ico">🍀</div><div class="lab">Fattore C</div></button>
</div></nav>

<div id="sheet"></div>

<script>
"use strict";
/* ============ FANTASSIST — motore probabilistico ============ */
const ROLES = ["P","D","C","A"];
const ROLE_LABEL = {P:"Portieri", D:"Difensori", C:"Centrocampisti", A:"Attaccanti"};
const ROLE_COLOR = {P:"var(--amber)", D:"var(--cyan)", C:"var(--chalk)", A:"var(--fluo)"};
const ROLE_MAX = {P:3, D:8, C:8, A:6};
const SIGMA = {P:1.1, D:1.2, C:1.4, A:1.9};
const PRIOR = {P:4.6, D:5.8, C:6.1, A:6.4};
const K_SHRINK = 8, BENCH_FV = 4.0, RIG_BONUS = 0.3, N_SIM = 3000;
const MODULES = [
  {name:"3-4-3", d:3, c:4, a:3}, {name:"4-3-3", d:4, c:3, a:3},
  {name:"4-4-2", d:4, c:4, a:2}, {name:"3-5-2", d:3, c:5, a:2},
  {name:"5-3-2", d:5, c:3, a:2}, {name:"5-4-1", d:5, c:4, a:1},
  {name:"4-5-1", d:4, c:5, a:1},
];

/* Pesi bonus-performance MISURATI su Serie A 2025-26 (7270 osservazioni,
   regressione standardizzata FV~segnali_p90 al netto della forma passata).
   bonus_FV = beta · FV_sd(ruolo) · clamp((valore−media)/sd, −2, +2) */
const PERF_W = {
  cap: 2.0,
  FV_sd: { A: 1.895, C: 1.328, D: 1.071 },
  ruoli: {
    A: { shots_p90: { beta: 0.112, mean: 2.451, sd: 0.943 }, xa_p90: { beta: 0.0, mean: 0.1425, sd: 0.1015 } },
    C: { shots_p90: { beta: 0.103, mean: 1.357, sd: 0.7967 }, xa_p90: { beta: 0.0, mean: 0.1134, sd: 0.091 } },
    D: { shots_p90: { beta: 0.051, mean: 0.6181, sd: 0.3926 }, xa_p90: { beta: 0.077, mean: 0.0678, sd: 0.0843 } },
    P: {},
  },
};

const S = {                    // stato applicazione
  db: [],                      // players.json → array giocatori
  byId: new Map(),
  points: {},                  // slug squadra → punti classifica
  fixtures: [],                // [{casa, trasferta}]
  rigoristi: {},               // slug → [slug giocatori]
  indisponibili: {},           // slug → [slug giocatori]
  understat: {},               // id(cod) → {shots_p90, xa_p90} (feed offensivo, quando presente)
  meta: null,
  roster: [],                  // [{id, pTit, rig, sq, inf}]
  leagueRosters: {},           // { nomeFantasquadra: [cod, ...] } dall'import Leghe Fantacalcio
  myTeamName: null,            // la mia fantasquadra
  oppName: null,               // avversario selezionato nella scheda Sfida
  tab: "rosa", threshold: 66, selMod: null, mcSeed: 0,
};

/* ---------- persistenza ---------- */
function saveLocal(){
  localStorage.setItem("fantassist", JSON.stringify(
    {roster:S.roster, threshold:S.threshold,
     leagueRosters:S.leagueRosters, myTeamName:S.myTeamName}));
}
function loadLocal(){
  try{
    const d = JSON.parse(localStorage.getItem("fantassist") || "{}");
    if(Array.isArray(d.roster)) S.roster = d.roster;
    if(d.threshold) S.threshold = d.threshold;
    if(d.leagueRosters) S.leagueRosters = d.leagueRosters;
    if(d.myTeamName) S.myTeamName = d.myTeamName;
  }catch(e){}
}

/* ---------- caricamento dati pipeline ---------- */
async function getJSON(name){
  const r = await fetch("data/" + name, {cache:"no-store"});
  if(!r.ok) throw new Error(name + ": " + r.status);
  return r.json();
}
const normName = s => (s||"").toLowerCase().normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");

async function loadData(){
  const res = await Promise.allSettled([
    getJSON("players.json"), getJSON("classifica.json"), getJSON("calendario.json"),
    getJSON("rigoristi.json"), getJSON("indisponibili.json"), getJSON("meta.json"),
    getJSON("understat.json"),
  ]);
  const [pl, cl, cal, rig, ind, meta, us] = res.map(r => r.status==="fulfilled" ? r.value : null);

  if(pl){
    S.db = pl.giocatori.filter(p => p.id && p.nome);
    S.db.forEach(p => S.byId.set(p.id, p));
  }
  if(cl){
    // mappa nome classifica → slug squadra dei giocatori
    const slugs = [...new Set(S.db.map(p => p.squadra))];
    cl.classifica.forEach(row => {
      const n = normName(row.squadra);
      const slug = slugs.find(s => n.includes(normName(s)) || normName(s).includes(n));
      if(slug) S.points[slug] = row.punti;
    });
  }
  if(cal) S.fixtures = cal.partite || [];
  if(rig) S.rigoristi = rig.rigoristi || {};
  if(ind) S.indisponibili = ind.indisponibili || {};
  if(us && us.giocatori){                      // feed offensivo: { giocatori: { cod: {shots_p90, xa_p90} } }
    S.understat = us.giocatori;
  }
  S.meta = meta;

  const dt = pl ? new Date(pl.aggiornato) : null;
  document.getElementById("subtitle").textContent = pl
    ? `${S.db.length} giocatori · dati ${dt.toLocaleDateString("it-IT")}`
    : "⚠ dati non raggiungibili";
}

/* ---------- motore ---------- */
function playerSlugOf(p){                    // slug del giocatore dal nome (per rigoristi/indisponibili)
  return normName(p.nome).replace(/\./g,"");
}
function ptsRange(){
  const v = Object.values(S.points);
  return v.length ? [Math.min(...v), Math.max(...v)] : [0, 1];
}
function strength(teamSlug){
  const [lo, hi] = ptsRange();
  const p = S.points[teamSlug];
  return p == null || hi === lo ? 0.5 : (p - lo) / (hi - lo);
}
function matchInfo(teamSlug){
  for(const f of S.fixtures){
    if(f.casa === teamSlug) return {opp:f.trasferta, home:true};
    if(f.trasferta === teamSlug) return {opp:f.casa, home:false};
  }
  return null;
}
function calAdj(teamSlug){
  const m = matchInfo(teamSlug);
  if(!m) return {adj:0, opp:null, home:null};    // campionato fermo o squadra a riposo
  return {adj:(m.home ? .15 : -.15) + (0.5 - strength(m.opp)) * 0.9, opp:m.opp, home:m.home};
}
function shrunk(st){
  const pg = st.pv || 0, fm = st.fm ?? PRIOR[roleOf(st)];
  return (pg*fm + K_SHRINK*PRIOR[roleOf(st)]) / (pg + K_SHRINK);
}
function roleOf(st){ return st.ruolo || "C"; }
function perfBonus(st){                          // bonus da statistiche offensive Understat
  const role = roleOf(st), w = PERF_W.ruoli[role], u = S.understat[st.id];
  if (!w || !u) return { val: 0, has: false };   // nessun feed (es. campionato fermo) → 0
  const fvsd = PERF_W.FV_sd[role] || 0;
  let b = 0, used = false;
  for (const sig of ["shots_p90", "xa_p90"]) {
    const c = w[sig];
    if (!c || !c.beta || u[sig] == null) continue;
    const z = Math.max(-PERF_W.cap, Math.min(PERF_W.cap, (u[sig] - c.mean) / c.sd));
    b += c.beta * fvsd * z; used = true;
  }
  return { val: b, has: used };
}
function expFV(r){                               // r = elemento roster
  const st = S.byId.get(r.id);
  const cal = calAdj(st.squadra);
  const perf = perfBonus(st);
  return { val: shrunk(st) + cal.adj + (r.rig ? RIG_BONUS : 0) + perf.val,
           cal, base: shrunk(st), st, perf };
}
function slotEV(r){
  return (r.pTit/100) * expFV(r).val + (1 - r.pTit/100) * BENCH_FV;
}
function rosterByRole(role){
  return S.roster.filter(r => roleOf(S.byId.get(r.id)) === role);
}
function bestLineup(mod){
  const avail = S.roster.filter(r => !r.sq && !r.inf);
  const by = role => avail.filter(r => roleOf(S.byId.get(r.id)) === role)
    .sort((a,b) => slotEV(b) - slotEV(a));
  const xi = [...by("P").slice(0,1), ...by("D").slice(0,mod.d),
              ...by("C").slice(0,mod.c), ...by("A").slice(0,mod.a)];
  const need = 1 + mod.d + mod.c + mod.a;
  const bench = {};
  ROLES.forEach(role => bench[role] = by(role).filter(r => !xi.includes(r)));
  return {xi, bench, complete: xi.length === need,
          ev: xi.reduce((s,r) => s + slotEV(r), 0) - (xi.length === need ? 0 : 99)};
}
function gauss(){
  let u = 0, v = 0;
  while(!u) u = Math.random();
  while(!v) v = Math.random();
  return Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
}
function monteCarlo(lu){
  const totals = new Float64Array(N_SIM);
  const xi = lu.xi.map(r => ({p:r.pTit/100, e:expFV(r).val, s:SIGMA[roleOf(S.byId.get(r.id))], role:roleOf(S.byId.get(r.id))}));
  const bench = {};
  ROLES.forEach(role => bench[role] = lu.bench[role].map(r =>
    ({e:expFV(r).val, s:SIGMA[role]})));
  for(let i=0; i<N_SIM; i++){
    let tot = 0; const used = {P:0,D:0,C:0,A:0};
    for(const x of xi){
      if(Math.random() < x.p) tot += x.e + x.s*gauss();
      else{
        const sub = bench[x.role][used[x.role]++];
        tot += sub ? sub.e*0.97 + sub.s*gauss() : 0;
      }
    }
    totals[i] = tot;
  }
  const s = Array.from(totals).sort((a,b) => a-b);
  const q = x => s[Math.floor(x*(N_SIM-1))];
  return {sorted:s, mean:s.reduce((a,b)=>a+b,0)/N_SIM, p10:q(.1), p50:q(.5), p90:q(.9)};
}

/* ---------- LEGA: import rose + confronto ---------- */
function teamMatch(abbr, slug){       // per risolvere le omonimie con la squadra
  const a=normName(abbr), b=normName(slug);
  if(!a||!b) return false;
  return b.startsWith(a.slice(0,3)) || a.startsWith(b.slice(0,3)) || b.includes(a) || a.includes(b);
}
function buildNameIndex(){
  const idx=new Map();
  for(const p of S.db){
    const k=normName(p.nome);
    if(!idx.has(k)) idx.set(k,[]);
    idx.get(k).push(p);
  }
  return idx;
}
function parseLeagueWorkbook(buf){
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets["TutteLeRose"]||wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  const RS=new Set(["P","D","C","A"]); const teams={};
  for(const off of [0,5]){
    let cur=null;
    for(const r of rows){
      const a=(r[off]??"").toString().trim(), b=(r[off+1]??"").toString().trim();
      if(!a) continue;
      if(RS.has(a) && b){ if(cur) teams[cur].push({ruolo:a, nome:b, squadra:(r[off+2]??"").toString().trim()}); }
      else{
        const low=a.toLowerCase();
        if(low!=="ruolo" && !a.startsWith("http") && !a.startsWith("*") && !low.startsWith("rose lega")){
          cur=a; if(!teams[cur]) teams[cur]=[];
        }
      }
    }
  }
  const out={}; for(const k in teams){ if(teams[k].length>=15) out[k]=teams[k]; }
  return out;
}
function matchLeagueRoster(players, idx){
  const cods=[], missed=[];
  for(const p of players){
    const c=idx.get(normName(p.nome))||[];
    let ch=null;
    if(c.length===1) ch=c[0];
    else if(c.length>1) ch=c.find(x=>teamMatch(p.squadra,x.squadra))||c[0];
    if(ch) cods.push(ch.id); else missed.push(p.nome);
  }
  return {cods, missed};
}
function triggerImport(){ el("leaguefile").click(); }
function onLeagueFile(input){
  const file=input.files && input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const teams=parseLeagueWorkbook(e.target.result);
      if(!Object.keys(teams).length) throw new Error("nessuna rosa riconosciuta");
      const idx=buildNameIndex(); const rosters={}, report={};
      for(const [name,players] of Object.entries(teams)){
        const {cods,missed}=matchLeagueRoster(players,idx);
        rosters[name]=cods; report[name]={n:players.length, matched:cods.length, missed:missed.length};
      }
      S.leagueRosters=rosters; S._importReport=report; saveLocal(); render();
    }catch(err){ alert("Non riesco a leggere il file: "+err.message); }
  };
  reader.readAsArrayBuffer(file);
  input.value="";
}
function loadMyTeam(name){

// miglior formazione per una rosa qualunque (lista di elementi {id,pTit,rig,sq,inf})
function bestLineupFrom(roster, mod){
  const avail=roster.filter(r=>!r.sq&&!r.inf);
  const by=role=>avail.filter(r=>roleOf(S.byId.get(r.id))===role).sort((a,b)=>slotEV(b)-slotEV(a));
  const xi=[...by("P").slice(0,1),...by("D").slice(0,mod.d),...by("C").slice(0,mod.c),...by("A").slice(0,mod.a)];
  const need=1+mod.d+mod.c+mod.a; const bench={};
  ROLES.forEach(role=>bench[role]=by(role).filter(r=>!xi.includes(r)));
  return {xi,bench,complete:xi.length===need, ev:xi.reduce((s,r)=>s+slotEV(r),0)-(xi.length===need?0:99)};
}
function bestOf(roster){
  const r=MODULES.map(m=>({mod:m,lu:bestLineupFrom(roster,m)})).filter(x=>x.lu.complete)
    .sort((a,b)=>b.lu.ev-a.lu.ev);
  return r[0]||null;
}
function oppRosterOf(name){
  return (S.leagueRosters[name]||[]).map(id=>{
    const st=S.byId.get(id), f=st?autoFlags(st):{sq:false,inf:false,rig:false};
    return {id, pTit:75, rig:f.rig, sq:f.sq, inf:f.inf};
  });
}
function winProb(a, b, k=4000){       // P(a batte b) da due distribuzioni simulate
  let w=0,e=0; const na=a.length, nb=b.length;
  for(let i=0;i<k;i++){ const x=a[(Math.random()*na)|0], y=b[(Math.random()*nb)|0];
    if(x>y) w++; else if(x===y) e++; }
  return {win:w/k, draw:e/k};
}

function pitchSVG(lu, mod){
  const rows = [["A", mod.a, 66], ["C", mod.c, 164], ["D", mod.d, 262], ["P", 1, 348]];
  const byRole = {P:[],D:[],C:[],A:[]};
  lu.xi.forEach(r => byRole[roleOf(S.byId.get(r.id))].push(r));
  let g = "";
  for(const [role, n, y] of rows){
    byRole[role].slice(0, n).forEach((r, i) => {

      const nm = st.nome.length > 11 ? st.nome.slice(0,10)+"…" : st.nome;

        <text x="${x}" y="${y+30}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--chalk)">${esc(nm)}</text>`;
    });
  }
  return `<svg viewBox="0 0 340 396" style="width:100%; max-height:380px">
    <rect x="8" y="8" width="324" height="380" rx="10" fill="var(--bg2)" stroke="var(--line)"/>

    <rect x="95" y="326" width="150" height="62" fill="none" stroke="var(--line)"/>
    <rect x="135" y="361" width="70" height="27" fill="none" stroke="var(--line)"/>${g}</svg>`;
}
function histSVG(mc){
  const bins = 26, lo = mc.sorted[0], hi = mc.sorted[mc.sorted.length-1];
  const w = (hi-lo)/bins || 1, counts = new Array(bins).fill(0);
  mc.sorted.forEach(v => counts[Math.min(bins-1, Math.floor((v-lo)/w))]++);
  const maxC = Math.max(...counts);
  let bars = "";
  counts.forEach((c, i) => {
    const mid = lo + w*(i+.5), h = c/maxC*80;
    bars += `<rect x="${i*(340/bins)+1}" y="${86-h}" width="${340/bins-2}" height="${Math.max(h,2)}" rx="1.5"
      fill="${mid >= S.threshold ? "var(--fluo)" : "var(--line)"}"/>`;
  });
  return `<svg viewBox="0 0 340 90" style="width:100%; padding:0 14px; box-sizing:border-box">${bars}</svg>`;
}

function spinFC(){
  const avail = S.roster.filter(r => !r.sq && !r.inf);
  const mod = MODULES[Math.floor(Math.random()*MODULES.length)];
  const pick = (role, n) => {
    const pool = avail.filter(r => roleOf(S.byId.get(r.id)) === role);
    for(let i = pool.length-1; i > 0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, n);
  };
  const xi = [...pick("P",1), ...pick("D",mod.d), ...pick("C",mod.c), ...pick("A",mod.a)];
  fcResult = {mod, lu:{xi}};
  render();
}

function renderSfida(){
  const teams=Object.keys(S.leagueRosters);
  if(!teams.length){
    el("main").innerHTML=`<div class="empty">⚔️<br>Per il confronto serve prima importare le rose della lega.<br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai a Rosa → Importa</button></div>`;
    return;
  }
  if(!S.myTeamName){
    el("main").innerHTML=`<div class="empty">Indica prima qual è la <b>tua</b> squadra.<br><br>
      <button class="btn primary" onclick="S.tab='rosa'; render()">Vai a Rosa</button></div>`;
    return;
  }
  const others=teams.filter(t=>t!==S.myTeamName);
  const opp=(S.oppName&&others.includes(S.oppName))?S.oppName:others[0];
  S.oppName=opp;

  const myBest=bestOf(S.roster);
  const oppBest=bestOf(oppRosterOf(opp));
  let head='';
  if(myBest&&oppBest){
    const mMC=monteCarlo(myBest.lu), oMC=monteCarlo(oppBest.lu);
    const wp=winProb(mMC.sorted,oMC.sorted);
    const myWin=wp.win+wp.draw/2;    // metà dei pareggi
    head=`<div class="card" style="padding:14px">
      <div class="vsrow">
        <div class="vsside"><div class="vsname" style="color:var(--fluo)">${esc(S.myTeamName)}</div>
          <div class="vstot">${fmt(mMC.mean,1)}</div></div>
        <div class="vsmid">
          <div class="wp" style="color:${myWin>=.5?"var(--fluo)":"var(--amber)"}">${fmt(myWin*100,0)}%</div>
          <div class="wplab">vittoria</div>
          <div class="vsmod">${myBest.mod.name} · ${oppBest.mod.name}</div>
        </div>
        <div class="vsside"><div class="vsname">${esc(opp)}</div>
          <div class="vstot">${fmt(oMC.mean,1)}</div></div>
      </div>
    </div>`;
  }
  const pick=`<select class="oppsel" onchange="S.oppName=this.value; render()">
    ${others.map(t=>`<option ${t===opp?"selected":""}>${esc(t)}</option>`).join("")}</select>`;

  el("main").innerHTML=`
    <div class="rolehead" style="color:var(--dim)">Avversario di giornata</div>
    <div style="padding:0 3px 6px">${pick}</div>
    ${head}
    <div class="cmpgrid">
      <div class="card" style="padding:10px"><div class="cmphead" style="color:var(--fluo)">La tua formazione</div>${miniPitch(myBest,"var(--fluo)")}</div>
      <div class="card" style="padding:10px"><div class="cmphead">${esc(opp)}</div>${miniPitch(oppBest,"var(--chalk)")}</div>
    </div>
    <div class="note">La tua formazione usa i tuoi ritocchi (titolarità, squalifiche…); quella avversaria
      parte da impostazioni standard. Probabilità stimata da ${N_SIM} simulazioni per parte.</div>`;
}

/* ---------- routing ---------- */
function render(){
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("on", b.dataset.tab === S.tab));
  ({rosa:renderRosa, giornata:renderGiornata,
    formazione:renderFormazione, fattorec:renderFattoreC, sfida:renderSfida})[S.tab]();
}
document.querySelectorAll("nav button").forEach(b =>
  b.addEventListener("click", () => { S.tab = b.dataset.tab; render(); }));

loadLocal();
loadData().then(render).catch(() => {
  el("main").innerHTML = `<div class="empty">⚠ Impossibile caricare i dati.<br>
    Verifica che la cartella <b>data/</b> con i JSON sia nel repository.</div>`;
});
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
